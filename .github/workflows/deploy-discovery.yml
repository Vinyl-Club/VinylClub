name: Deploy Discovery Service to Azure

on:
  push:
    branches: [ feature-deploy ]
    paths:
      - 'BACK/vinyl-discovery-service/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./BACK/vinyl-discovery-service
          push: true
          tags: ghcr.io/${{ env.REPO }}/discovery:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: vinylclub-discovery
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_DISCOVERY }}
          images: ghcr.io/${{ env.REPO }}/discovery:${{ github.sha }}